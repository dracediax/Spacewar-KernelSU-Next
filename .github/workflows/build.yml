name: Build Kernel & Release

on:
  workflow_dispatch:     # Manual trigger
  push:
    branches: [main]
    paths:
      - 'UpdateAndRelease.sh'
      - '.github/workflows/build.yml'
      - 'configs/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # Needed for creating releases

    steps:
      # ── Free disk space (kernel builds need ~25GB) ──────────
      - name: Free disk space
        run: |
          echo "Before cleanup:"
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android \
            /opt/ghc /usr/local/share/boost /opt/hostedtoolcache
          sudo apt-get clean
          echo "After cleanup:"
          df -h /

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # Full history for tag detection

      # ── Compute next version ────────────────────────────────
      - name: Determine version
        id: version
        run: |
          # Get latest release tag (format: v1.0.X)
          LATEST=$(git tag -l 'v1.0.*' --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            NEXT="v1.0.0"
          else
            PATCH=$(echo "$LATEST" | sed 's/v1\.0\.//')
            NEXT="v1.0.$((PATCH + 1))"
          fi
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT"

      # ── Install dependencies ────────────────────────────────
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flex bison bc curl p7zip-full python3 jq zip \
            make git patch rsync libssl-dev libelf-dev openjdk-17-jdk-headless ccache
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> "$GITHUB_ENV"

      # ── Restore caches ──────────────────────────────────────
      - name: Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: ~/.ccache
          key: ccache-kernel-${{ github.sha }}
          restore-keys: ccache-kernel-

      - name: Restore Clang toolchain
        id: cache-clang
        uses: actions/cache/restore@v4
        with:
          path: tc/r383902b1
          key: clang-r383902b1-v1

      - name: Restore kernel source
        id: cache-kernel
        uses: actions/cache/restore@v4
        with:
          path: android_kernel_msm-5.4_nothing_sm7325
          key: kernel-source-zerofrip-v1

      - name: Restore boot image editor
        id: cache-booteditor
        uses: actions/cache/restore@v4
        with:
          path: tc/Android_boot_image_editor
          key: boot-image-editor-v1

      # ── Download on cache miss ─────────────────────────────
      - name: Download Clang toolchain
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          mkdir -p tc/r383902b1
          curl -L "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android11-qpr2-release/clang-r383902b1.tar.gz" \
            | tar -xz -C tc/r383902b1
          [ -f tc/r383902b1/bin/clang ] || { echo "Clang download failed"; exit 1; }

      - name: Clone kernel source
        if: steps.cache-kernel.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 -b sm7325/v/mr \
            https://github.com/zerofrip/Spacewar_NOS3.0_Kernel.git \
            android_kernel_msm-5.4_nothing_sm7325

      - name: Clone boot image editor
        if: steps.cache-booteditor.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/cfig/Android_boot_image_editor.git \
            tc/Android_boot_image_editor

      # ── Save caches (runs even on failure) ─────────────────
      - name: Save Clang cache
        if: always() && steps.cache-clang.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: tc/r383902b1
          key: clang-r383902b1-v1

      - name: Save kernel source cache
        if: always() && steps.cache-kernel.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: android_kernel_msm-5.4_nothing_sm7325
          key: kernel-source-zerofrip-v1

      - name: Save boot editor cache
        if: always() && steps.cache-booteditor.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: tc/Android_boot_image_editor
          key: boot-image-editor-v1

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.ccache
          key: ccache-kernel-${{ github.sha }}
        continue-on-error: true

      # ── Copy spacewar_defconfig into kernel tree ───────────
      - name: Copy spacewar_defconfig
        run: |
          cp configs/spacewar_defconfig \
            android_kernel_msm-5.4_nothing_sm7325/arch/arm64/configs/spacewar_defconfig
          echo "spacewar_defconfig copied"

      # ── Setup KernelSU-Next ─────────────────────────────────
      - name: Setup KernelSU-Next (legacy_susfs)
        id: ksu
        run: |
          KERNEL_DIR="$GITHUB_WORKSPACE/android_kernel_msm-5.4_nothing_sm7325"
          cd "$KERNEL_DIR"

          # Clone KernelSU-Next
          if [ ! -d "KernelSU-Next/.git" ]; then
            git clone -b legacy_susfs https://github.com/KernelSU-Next/KernelSU-Next.git KernelSU-Next
          else
            cd KernelSU-Next
            git fetch origin legacy_susfs
            git reset --hard origin/legacy_susfs
            git clean -fd
            cd ..
          fi

          # Unshallow and fetch tags for version detection
          cd KernelSU-Next
          git fetch --unshallow 2>/dev/null || true
          git fetch --tags 2>/dev/null || true
          KSU_VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' | sed 's/-legacy-susfs//')
          [ -z "$KSU_VERSION" ] && KSU_VERSION="unknown"
          echo "ksu_version=$KSU_VERSION" >> "$GITHUB_OUTPUT"
          echo "KernelSU-Next version: $KSU_VERSION"
          cd ..

          # Setup driver symlink
          [ -L "drivers/kernelsu" ] || ln -sf "../KernelSU-Next/kernel" "drivers/kernelsu"
          grep -q "kernelsu" drivers/Makefile || printf '\nobj-$(CONFIG_KSU) += kernelsu/\n' >> drivers/Makefile
          grep -q 'source "drivers/kernelsu/Kconfig"' drivers/Kconfig || \
            sed -i '/endmenu/i\source "drivers/kernelsu/Kconfig"' drivers/Kconfig

          # Bypass signature check
          sed -i 's/return check_v2_signature(path, EXPECTED_MANAGER_SIZE, EXPECTED_MANAGER_HASH);/return true;/g' \
            KernelSU-Next/kernel/apk_sign.c

          echo "KernelSU-Next integrated"

      # ── Patch kernel source ──────────────────────────────────
      - name: Patch kernel source
        run: |
          KERNEL_DIR="$GITHUB_WORKSPACE/android_kernel_msm-5.4_nothing_sm7325"
          cd "$KERNEL_DIR"

          # Add stubs for functions upstream legacy_susfs calls but
          # zerofrip's SUSFS v2.0.0 doesn't implement
          if ! grep -q "susfs_try_umount" fs/susfs.c; then
            cat >> fs/susfs.c << 'STUBS'

/* Stubs for KernelSU-Next legacy_susfs branch compat */
#ifdef CONFIG_KSU_SUSFS_TRY_UMOUNT
void susfs_add_try_umount(void __user **user_info) {
}
void susfs_try_umount(uid_t uid) {
}
#endif
#ifdef CONFIG_KSU_SUSFS_SUS_MOUNT
void susfs_reorder_mnt_id(void) {
}
#endif
STUBS
            echo "SUSFS compat stubs added"
          fi

          # Disable PINCTRL_WCD and PINCTRL_LPI — they need internal pinctrl
          # headers not available when building in-tree (designed as out-of-tree DLKMs)
          sed -i 's/^export CONFIG_PINCTRL_WCD=m/# export CONFIG_PINCTRL_WCD=m/' \
            techpack/audio/config/lahainaauto.conf
          sed -i 's/^export CONFIG_PINCTRL_LPI=m/# export CONFIG_PINCTRL_LPI=m/' \
            techpack/audio/config/lahainaauto.conf
          sed -i 's/^#define CONFIG_PINCTRL_WCD 1/\/\/ #define CONFIG_PINCTRL_WCD 1/' \
            techpack/audio/config/lahainaautoconf.h
          sed -i 's/^#define CONFIG_PINCTRL_LPI 1/\/\/ #define CONFIG_PINCTRL_LPI 1/' \
            techpack/audio/config/lahainaautoconf.h
          echo "PINCTRL_WCD and PINCTRL_LPI disabled (not buildable in-tree)"

      # ── Build kernel ────────────────────────────────────────
      - name: Build kernel
        id: build
        run: |
          KERNEL_DIR="$GITHUB_WORKSPACE/android_kernel_msm-5.4_nothing_sm7325"
          CLANG_DIR="$GITHUB_WORKSPACE/tc/r383902b1"
          RAW_DIR="$GITHUB_WORKSPACE/output/rawfiles"
          export PATH="$CLANG_DIR/bin:$PATH"
          export CCACHE_COMPRESS=1 CCACHE_DIR="$HOME/.ccache" CCACHE_MAXSIZE="5G"

          cd "$KERNEL_DIR"
          mkdir -p "$RAW_DIR"

          MAKE_PARAMS=(
            O="$RAW_DIR"
            ARCH=arm64
            CC="ccache clang"
            CLANG_TRIPLE=aarch64-linux-gnu-
            LLVM=1
            LLVM_IAS=1
            CROSS_COMPILE="$CLANG_DIR/bin/llvm-"
            LOCALVERSION="-qgki"
          )

          make "${MAKE_PARAMS[@]}" spacewar_defconfig
          make -j$(nproc --all) "${MAKE_PARAMS[@]}"
          echo "Kernel build complete"

      # ── Detect OS version from stock boot tag ───────────────
      - name: Detect stock OS version
        id: os_version
        run: |
          LATEST_TAG=$(curl -sf https://api.github.com/repos/spike0en/nothing_archive/releases \
            | grep -oP '"tag_name": "\KSpacewar_[^"]+' | head -n 1)
          [ -z "$LATEST_TAG" ] && LATEST_TAG="Spacewar_V3.2-251219-1652"

          # Extract OS version (e.g., "3.2" from "Spacewar_V3.2-251219-1652")
          OS_VERSION=$(echo "$LATEST_TAG" | grep -oP 'V\K[0-9]+\.[0-9]+')
          [ -z "$OS_VERSION" ] && OS_VERSION="3.2"

          echo "stock_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          echo "os_version=$OS_VERSION" >> "$GITHUB_OUTPUT"
          echo "Stock tag: $LATEST_TAG (NOS $OS_VERSION)"

      # ── Repack boot.img ─────────────────────────────────────
      - name: Repack boot.img
        run: |
          KERNEL_DIR="$GITHUB_WORKSPACE/android_kernel_msm-5.4_nothing_sm7325"
          RAW_DIR="$GITHUB_WORKSPACE/output/rawfiles"
          BOOT_EDITOR_DIR="$GITHUB_WORKSPACE/tc/Android_boot_image_editor"
          OUTPUT_DIR="$GITHUB_WORKSPACE/output"
          LATEST_TAG="${{ steps.os_version.outputs.stock_tag }}"

          cd "$KERNEL_DIR"

          # Download stock boot
          DOWNLOAD_URL="https://github.com/spike0en/nothing_archive/releases/download/${LATEST_TAG}/${LATEST_TAG}-image-boot.7z"
          curl -L "$DOWNLOAD_URL" -o image-boot.7z || true
          if [ ! -s "image-boot.7z" ]; then
            LATEST_TAG="Spacewar_V3.2-251219-1652"
            curl -L "https://github.com/spike0en/nothing_archive/releases/download/${LATEST_TAG}/${LATEST_TAG}-image-boot.7z" -o image-boot.7z
          fi

          7z x -y image-boot.7z
          EXTRACTED_BOOT=$(find . -maxdepth 2 -name "boot.img" ! -path "./AnyKernel3/*" | head -1)
          rm -f image-boot.7z

          # Repack
          cp "$EXTRACTED_BOOT" "$BOOT_EDITOR_DIR/boot.img"
          cd "$BOOT_EDITOR_DIR"
          ./gradlew unpack
          cp "$RAW_DIR/arch/arm64/boot/Image" build/unzip_boot/kernel
          ./gradlew pack
          [ -f boot.img.signed ] && cp boot.img.signed "$OUTPUT_DIR/boot.img" \
            || cp boot.img "$OUTPUT_DIR/boot.img"

          echo "boot.img repacked"

      # ── Package AnyKernel3 ZIP ──────────────────────────────
      - name: Package AnyKernel3 ZIP
        id: package
        run: |
          KERNEL_DIR="$GITHUB_WORKSPACE/android_kernel_msm-5.4_nothing_sm7325"
          RAW_DIR="$GITHUB_WORKSPACE/output/rawfiles"
          OUTPUT_DIR="$GITHUB_WORKSPACE/output"
          BUILD_VERSION="${{ steps.version.outputs.version }}"
          OS_VERSION="${{ steps.os_version.outputs.os_version }}"
          KSU_VER="${{ steps.ksu.outputs.ksu_version }}"

          cd "$KERNEL_DIR"

          [ -d "AnyKernel3" ] || git clone https://github.com/zerofrip/AnyKernel3 -b spacewar_nos3.0 AnyKernel3

          cp "$RAW_DIR/arch/arm64/boot/Image" AnyKernel3/
          if ls "$RAW_DIR/arch/arm64/boot/dts/vendor/qcom/"*.dtb &>/dev/null; then
            cat "$RAW_DIR/arch/arm64/boot/dts/vendor/qcom/"*.dtb > AnyKernel3/dtb
          fi
          if ls "$RAW_DIR/arch/arm64/boot/dts/vendor/qcom/"*.dtbo &>/dev/null; then
            python3 scripts/mkdtboimg.py create AnyKernel3/dtbo.img \
              --page_size=4096 "$RAW_DIR/arch/arm64/boot/dts/vendor/qcom/"*.dtbo
          fi

          ZIP_NAME="Spacewar_NOS${OS_VERSION}_KernelSU-Next_v${KSU_VER}_${BUILD_VERSION}.zip"
          cd AnyKernel3
          zip -r9 "$OUTPUT_DIR/$ZIP_NAME" ./* -x .git README.md '*placeholder*'
          cd ..

          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "Packaged: $ZIP_NAME"

      # ── Create GitHub Release ───────────────────────────────
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "NOS ${{ steps.os_version.outputs.os_version }} | KernelSU-Next v${{ steps.ksu.outputs.ksu_version }} | ${{ steps.version.outputs.version }}"
          body: |
            ## Spacewar KernelSU-Next — ${{ steps.version.outputs.version }}

            **Nothing OS:** ${{ steps.os_version.outputs.os_version }}
            **KernelSU-Next:** v${{ steps.ksu.outputs.ksu_version }}
            **SUSFS:** v2.0.0
            **Stock boot base:** ${{ steps.os_version.outputs.stock_tag }}

            ### Install
            - **Fastboot:** `fastboot flash boot boot.img`
            - **Kernel Manager:** Flash the `.zip` via Franco KM / SmartPack
            - **Manager APK:** Install from [rifsxd/KernelSU-Next releases](https://github.com/rifsxd/KernelSU-Next/releases)

            ### Compatibility
            Only flash on devices running **NOS ${{ steps.os_version.outputs.os_version }}** (stock tag: `${{ steps.os_version.outputs.stock_tag }}`).
          files: |
            output/boot.img
            output/${{ steps.package.outputs.zip_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
